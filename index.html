function App() {
const [role, setRole] = useState(null);
if (!role) return <LoginScreen onSelect={setRole} />;
return <TeamApp role={role} onLogout={() => setRole(null)} />;
}

function LoginScreen({ onSelect }) {
return (
<div style={{ fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif", minHeight: "100vh", maxWidth: 430, margin: "0 auto", background: "linear-gradient(160deg,#0F2744 0%,#1A3A5C 40%,#2E6DA4 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
<Logo size={56} />
<div style={{ fontSize: 28, fontWeight: 800, color: "#fff", marginTop: 16, letterSpacing: "0.06em" }}>FC Testigo</div>
<div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginTop: 6, marginBottom: 52, letterSpacing: "0.1em" }}>TEAM COMMUNICATION APP</div>
<div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 14 }}>
{[
{ role: "coach", icon: "🏆", label: "指導者ログイン", sub: "スケジュール・情報の投稿・ウェア発注の確認", accent: "#DC2626", shadow: "rgba(220,38,38,0.35)" },
{ role: "parent", icon: "👨‍👩‍👦", label: "保護者ログイン", sub: "情報の確認・送迎回答・ウェア発注", accent: "rgba(255,255,255,0.13)", shadow: "none" },
].map(r => (
<button key={r.role} onClick={() => onSelect(r.role)} style={{ width: "100%", padding: "18px 20px", borderRadius: 16, border: "none", background: r.accent, color: "#fff", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 14, boxShadow: r.shadow !== "none" ? `0 4px 20px ${r.shadow}` : "none" }}>
<span style={{ fontSize: 30 }}>{r.icon}</span>
<div>
<div style={{ fontSize: 15, fontWeight: 700 }}>{r.label}</div>
<div style={{ fontSize: 11, opacity: 0.7, marginTop: 3 }}>{r.sub}</div>
</div>
<span style={{ marginLeft: "auto", fontSize: 20, opacity: 0.5 }}>›</span>
</button>
))}
</div>
</div>
);
}

function TeamApp({ role, onLogout }) {
const isCoach = role === "coach";
const [tab, setTab] = useState("schedule");
const [selSched, setSelSched] = useState(null);
const [schedules, setSchedules] = useState(INIT_SCHEDULES);
const [venues, setVenues] = useState(INIT_VENUES);
const [transports, setTransports] = useState(INIT_TRANSPORTS);
const [wears] = useState(INIT_WEARS);
const [orders, setOrders] = useState([]);
const [modal, setModal] = useState(null);
const [editItem, setEditItem] = useState(null);
const NAV = [
{ id: "schedule", label: "スケジュール", icon: "📅" },
{ id: "venue", label: "会場", icon: "📍" },
{ id: "transport", label: "送迎", icon: "🚌" },
{ id: "wear", label: "ウェア", icon: "👕" },
];
return (
<div style={{ fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif", background: "#F5F7FA", minHeight: "100vh", maxWidth: 430, margin: "0 auto", paddingBottom: 80 }}>
<div style={{ background: "linear-gradient(135deg,#1A3A5C 0%,#2E6DA4 100%)", color: "#fff", padding: "14px 20px", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 12px rgba(0,0,0,0.15)" }}>
<div style={{ display: "flex", alignItems: "center", gap: 10 }}>
<Logo size={36} />
<div>
<div style={{ fontSize: 16, fontWeight: 800, letterSpacing: "0.04em" }}>FC Testigo</div>
<div style={{ fontSize: 10, opacity: 0.65, marginTop: 1 }}>{isCoach ? "🏆 指導者モード" : "👨‍👩‍👦 保護者モード"}</div>
</div>
<button onClick={onLogout} style={{ marginLeft: "auto", background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", borderRadius: 8, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>ログアウト</button>
</div>
</div>
{isCoach && tab !== "wear" && (
<div style={{ padding: "12px 16px 0" }}>
<button onClick={() => setModal(tab)} style={{ width: "100%", padding: "11px 0", borderRadius: 12, background: "#DC2626", border: "none", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
＋ {tab === "schedule" ? "スケジュール" : tab === "venue" ? "会場" : "送迎情報"}を投稿
</button>
</div>
)}
<div>
{tab === "schedule" && <ScheduleTab data={schedules} selected={selSched} onSelect={setSelSched} isCoach={isCoach} onEdit={item => { setEditItem(item); setModal("edit-schedule"); }} onDelete={id => setSchedules(p => p.filter(x => x.id !== id))} />}
{tab === "venue" && <VenueTab data={venues} isCoach={isCoach} onEdit={item => { setEditItem(item); setModal("edit-venue"); }} onDelete={id => setVenues(p => p.filter(x => x.id !== id))} />}
{tab === "transport" && <TransportTab data={transports} isCoach={isCoach} onEdit={item => { setEditItem(item); setModal("edit-transport"); }} onDelete={id => setTransports(p => p.filter(x => x.id !== id))} />}
{tab === "wear" && <WearTab data={wears} isCoach={isCoach} orders={orders} onOrder={o => setOrders(p => [...p, o])} />}
</div>
<div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "#fff", borderTop: "1px solid #E5E9F0", display: "flex", boxShadow: "0 -4px 20px rgba(0,0,0,0.08)" }}>
{NAV.map(n => (
<button key={n.id} onClick={() => { setTab(n.id); setSelSched(null); }} style={{ flex: 1, border: "none", background: "none", padding: "10px 0 12px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
<span style={{ fontSize: 20 }}>{n.icon}</span>
<span style={{ fontSize: 10, fontWeight: tab === n.id ? 700 : 400, color: tab === n.id ? "#2E6DA4" : "#94A3B8" }}>{n.label}</span>
{tab === n.id && <div style={{ width: 20, height: 3, borderRadius: 2, background: "#2E6DA4" }} />}
</button>
))}
</div>
{modal === "schedule" && <PostScheduleModal onClose={() => setModal(null)} onSave={v => { setSchedules(p => [...p, { ...v, id: Date.now() }]); setModal(null); }} />}
{modal === "venue" && <PostVenueModal onClose={() => setModal(null)} onSave={v => { setVenues(p => [...p, { ...v, id: Date.now() }]); setModal(null); }} />}
{modal === "transport" && <PostTransportModal onClose={() => setModal(null)} onSave={v => { setTransports(p => [...p, { ...v, id: Date.now() }]); setModal(null); }} />}
{modal === "edit-schedule" && editItem && <PostScheduleModal initialData={editItem} onClose={() => { setModal(null); setEditItem(null); }} onSave={v => { setSchedules(p => p.map(x => x.id === editItem.id ? { ...v, id: editItem.id } : x)); setModal(null); setEditItem(null); }} />}
{modal === "edit-venue" && editItem && <PostVenueModal initialData={editItem} onClose={() => { setModal(null); setEditItem(null); }} onSave={v => { setVenues(p => p.map(x => x.id === editItem.id ? { ...v, id: editItem.id } : x)); setModal(null); setEditItem(null); }} />}
{modal === "edit-transport" && editItem && <PostTransportModal initialData={editItem} onClose={() => { setModal(null); setEditItem(null); }} onSave={v => { setTransports(p => p.map(x => x.id === editItem.id ? { ...v, id: editItem.id } : x)); setModal(null); setEditItem(null); }} />}
</div>
);
}

function EditDeleteBar({ onEdit, onDelete }) {
const [confirm, setConfirm] = useState(false);
return (
<div style={{ display: "flex", gap: 8, marginTop: 10, borderTop: "1px solid #F1F5F9", paddingTop: 10 }}>
<button onClick={onEdit} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "1.5px solid #2E6DA4", background: "#fff", color: "#2E6DA4", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✏️ 編集</button>
{confirm
? <div style={{ flex: 2, display: "flex", gap: 6 }}>
<button onClick={onDelete} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "none", background: "#DC2626", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>削除する</button>
<button onClick={() => setConfirm(false)} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "1.5px solid #94A3B8", background: "#fff", color: "#64748B", fontSize: 12, cursor: "pointer" }}>戻る</button>
</div>
: <button onClick={() => setConfirm(true)} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "1.5px solid #EF4444", background: "#fff", color: "#EF4444", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>🗑 削除</button>
}
</div>
);
}

function ScheduleTab({ data, selected, onSelect, isCoach, onEdit, onDelete }) {
if (selected) return <ScheduleDetail item={selected} onBack={() => onSelect(null)} />;
return (
<div>
<SH title="スケジュール" sub={`${data.length}件`} />
<div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
{data.map(item => {
const cc = CC[item.category] || CC["イベント"];
return (
<div key={item.id} style={{ background: "#fff", borderRadius: 14, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", borderLeft: `4px solid ${cc.border}` }}>
<div onClick={() => onSelect(item)} style={{ cursor: "pointer" }}>
<span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 20, background: cc.bg, color: cc.text }}>{item.category}</span>
