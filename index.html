<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FC Testigo" />
  <title>FC Testigo</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F7FA; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

const INIT_SCHEDULES = [
{ id: 1, title: "練習", date: "2026年5月3日（日）", gather: "08:45", end: "12:00", category: "練習", items: ["ボール", "水筒", "着替え"], venue: "市立第一グラウンド" },
{ id: 2, title: "春季リーグ戦 第1節", date: "2026年5月10日（日）", gather: "07:30", end: "17:00", category: "試合", items: ["ユニフォーム上下", "スパイク", "水筒", "タオル", "お弁当"], venue: "県立スポーツ公園 Aコート" },
{ id: 3, title: "遠征合宿", date: "2026年5月24日（土）〜25日（日）", gather: "06:00", end: "18:00", category: "遠征", items: ["着替え2日分", "洗面用具", "寝具不要", "現金3,000円"], venue: "山梨県立総合スポーツ施設" },
];
const INIT_VENUES = [
{ id: 1, name: "市立第一グラウンド", address: "東京都練馬区上石神井3-1-1", parking: "第一駐車場（50台）／場外コインパーキング有", rules: "駐車場は8:00〜18:00。ゴミは必ず持ち帰り。", notes: "西武新宿線「上石神井」駅より徒歩8分" },
{ id: 2, name: "県立スポーツ公園 Aコート", address: "神奈川県川崎市多摩区枡形7-1-1", parking: "第3駐車場（有料 300円/h）", rules: "スパイク着用はコート内のみ。", notes: "当日は混雑が予想されます。公共交通機関を推奨。" },
];
const INIT_TRANSPORTS = [
{ id: 1, eventTitle: "春季リーグ戦 第1節", date: "2026年5月10日（日）", gatherSpot: "市立第一グラウンド 駐車場前", gatherTime: "07:15", departTime: "07:30", method: "チームバス", notes: "バス乗り遅れの場合は必ずコーチに連絡してください。" },
{ id: 2, eventTitle: "遠征合宿", date: "2026年5月24日（土）", gatherSpot: "東戸塚駅 西口ロータリー", gatherTime: "05:45", departTime: "06:00", method: "チャーターバス（マイクロバス2台）", notes: "貴重品・大型荷物の管理は各自でお願いします。" },
];
const INIT_WEARS = [
{ id: 1, title: "2026夏季 練習着セット", period: "〜2026年5月15日（木）", status: "受付中", items: [{ name: "プラクティスシャツ", sizes: ["130","140","150","160","S","M","L"], price: 3300 }, { name: "プラクティスパンツ", sizes: ["130","140","150","160","S","M","L"], price: 2750 }, { name: "ハーフソックス（3足セット）", sizes: ["19-21cm","22-24cm","25-27cm"], price: 1540 }], payment: "現金（活動日に担当者へ）", delivery: "2026年6月中旬予定" },
{ id: 2, title: "ユニフォーム上下（背番号入り）", period: "〜2026年6月1日（日）", status: "近日開始", items: [{ name: "ゲームシャツ（背番号入り）", sizes: ["130","140","150","160","S","M","L"], price: 6600 }, { name: "ゲームパンツ", sizes: ["130","140","150","160","S","M","L"], price: 4400 }], payment: "銀行振込 または 現金", delivery: "2026年7月中旬予定" },
];

const CC = {
練習: { bg: "#E8F5E9", text: "#2E7D32", border: "#A5D6A7" },
試合: { bg: "#E3F2FD", text: "#1565C0", border: "#90CAF9" },
遠征: { bg: "#FFF3E0", text: "#E65100", border: "#FFCC80" },
イベント: { bg: "#F3E5F5", text: "#6A1B9A", border: "#CE93D8" },
};

const Logo = ({ size = 38 }) => (
<svg width={size} height={size} viewBox="0 0 44 44" fill="none">
  <polygon points="0,3 20,3 22,43"         fill="#AFAFAF" />
  <polygon points="24,3 44,3 22,43"        fill="#A0A0A0" />
  <polygon points="10,3 34,3 34,14 10,14"  fill="#C02020" />
  <polygon points="18,14 26,14 24,43 16,43" fill="#961818" />
</svg>
);

function App() {
const [role, setRole] = useState(null);
if (!role) return <LoginScreen onSelect={setRole} />;
return <TeamApp role={role} onLogout={() => setRole(null)} />;
}

function LoginScreen({ onSelect }) {
return (
<div style={{ fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif", minHeight: "100vh", maxWidth: 430, margin: "0 auto", background: "linear-gradient(160deg,#0F2744 0%,#1A3A5C 40%,#2E6DA4 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
<Logo size={56} />
<div style={{ fontSize: 28, fontWeight: 800, color: "#fff", marginTop: 16, letterSpacing: "0.06em" }}>FC Testigo</div>
<div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginTop: 6, marginBottom: 52, letterSpacing: "0.1em" }}>TEAM COMMUNICATION APP</div>
<div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 14 }}>
{[
{ role: "coach", icon: "🏆", label: "指導者ログイン", sub: "スケジュール・情報の投稿・ウェア発注の確認", accent: "#DC2626", shadow: "rgba(220,38,38,0.35)" },
{ role: "parent", icon: "👨‍👩‍👦", label: "保護者ログイン", sub: "情報の確認・送迎回答・ウェア発注", accent: "rgba(255,255,255,0.13)", shadow: "none" },
].map(r => (
<button key={r.role} onClick={() => onSelect(r.role)} style={{ width: "100%", padding: "18px 20px", borderRadius: 16, border: "none", background: r.accent, color: "#fff", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 14, boxShadow: r.shadow !== "none" ? `0 4px 20px ${r.shadow}` : "none" }}>
<span style={{ fontSize: 30 }}>{r.icon}</span>
<div>
<div style={{ fontSize: 15, fontWeight: 700 }}>{r.label}</div>
<div style={{ fontSize: 11, opacity: 0.7, marginTop: 3 }}>{r.sub}</div>
</div>
<span style={{ marginLeft: "auto", fontSize: 20, opacity: 0.5 }}>›</span>
</button>
))}
</div>
</div>
);
}

function TeamApp({ role, onLogout }) {
const isCoach = role === "coach";
const [tab, setTab] = useState("schedule");
const [selSched, setSelSched] = useState(null);
const [schedules, setSchedules] = useState(INIT_SCHEDULES);
const [venues, setVenues] = useState(INIT_VENUES);
const [transports, setTransports] = useState(INIT_TRANSPORTS);
const [wears] = useState(INIT_WEARS);
const [orders, setOrders] = useState([]);
const [modal, setModal] = useState(null);
const NAV = [
{ id: "schedule", label: "スケジュール", icon: "📅" },
{ id: "venue", label: "会場", icon: "📍" },
{ id: "transport", label: "送迎", icon: "🚌" },
{ id: "wear", label: "ウェア", icon: "👕" },
];
return (
<div style={{ fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif", background: "#F5F7FA", minHeight: "100vh", maxWidth: 430, margin: "0 auto", paddingBottom: 80 }}>
<div style={{ background: "linear-gradient(135deg,#1A3A5C 0%,#2E6DA4 100%)", color: "#fff", padding: "14px 20px", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 12px rgba(0,0,0,0.15)" }}>
<div style={{ display: "flex", alignItems: "center", gap: 10 }}>
<Logo size={36} />
<div>
<div style={{ fontSize: 16, fontWeight: 800, letterSpacing: "0.04em" }}>FC Testigo</div>
<div style={{ fontSize: 10, opacity: 0.65, marginTop: 1 }}>{isCoach ? "🏆 指導者モード" : "👨‍👩‍👦 保護者モード"}</div>
</div>
<button onClick={onLogout} style={{ marginLeft: "auto", background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", borderRadius: 8, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>ログアウト</button>
</div>
</div>
{isCoach && tab !== "wear" && (
<div style={{ padding: "12px 16px 0" }}>
<button onClick={() => setModal(tab)} style={{ width: "100%", padding: "11px 0", borderRadius: 12, background: "#DC2626", border: "none", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
＋ {tab === "schedule" ? "スケジュール" : tab === "venue" ? "会場" : "送迎情報"}を投稿
</button>
</div>
)}
<div>
{tab === "schedule" && <ScheduleTab data={schedules} selected={selSched} onSelect={setSelSched} />}
{tab === "venue" && <VenueTab data={venues} />}
{tab === "transport" && <TransportTab data={transports} />}
{tab === "wear" && <WearTab data={wears} isCoach={isCoach} orders={orders} onOrder={o => setOrders(p => [...p, o])} />}
</div>
<div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "#fff", borderTop: "1px solid #E5E9F0", display: "flex", boxShadow: "0 -4px 20px rgba(0,0,0,0.08)" }}>
{NAV.map(n => (
<button key={n.id} onClick={() => { setTab(n.id); setSelSched(null); }} style={{ flex: 1, border: "none", background: "none", padding: "10px 0 12px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
<span style={{ fontSize: 20 }}>{n.icon}</span>
<span style={{ fontSize: 10, fontWeight: tab === n.id ? 700 : 400, color: tab === n.id ? "#2E6DA4" : "#94A3B8" }}>{n.label}</span>
{tab === n.id && <div style={{ width: 20, height: 3, borderRadius: 2, background: "#2E6DA4" }} />}
</button>
))}
</div>
{modal === "schedule" && <PostScheduleModal onClose={() => setModal(null)} onSave={v => { setSchedules(p => [...p, { ...v, id: Date.now() }]); setModal(null); }} />}
{modal === "venue" && <PostVenueModal onClose={() => setModal(null)} onSave={v => { setVenues(p => [...p, { ...v, id: Date.now() }]); setModal(null); }} />}
{modal === "transport" && <PostTransportModal onClose={() => setModal(null)} onSave={v => { setTransports(p => [...p, { ...v, id: Date.now() }]); setModal(null); }} />}
</div>
);
}

function ScheduleTab({ data, selected, onSelect }) {
if (selected) return <ScheduleDetail item={selected} onBack={() => onSelect(null)} />;
return (
<div>
<SH title="スケジュール" sub={`${data.length}件`} />
<div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
{data.map(item => {
const cc = CC[item.category] || CC["イベント"];
return (
<div key={item.id} onClick={() => onSelect(item)} style={{ background: "#fff", borderRadius: 14, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", cursor: "pointer", borderLeft: `4px solid ${cc.border}` }}>
<span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 20, background: cc.bg, color: cc.text }}>{item.category}</span>
<div style={{ fontSize: 16, fontWeight: 700, color: "#1E293B", margin: "6px 0 8px" }}>{item.title}</div>
<div style={{ fontSize: 13, color: "#475569", marginBottom: 3 }}>📅 {item.date}</div>
<div style={{ fontSize: 13, color: "#475569" }}>⏰ 集合 {item.gather} 〜 解散 {item.end}</div>
</div>
);
})}
</div>
</div>
);
}

function ScheduleDetail({ item, onBack }) {
const cc = CC[item.category] || CC["イベント"];
return (
<div>
<BackBar title="スケジュール詳細" onBack={onBack} />
<div style={{ padding: 16 }}>
<div style={{ background: "#fff", borderRadius: 16, padding: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", borderTop: `4px solid ${cc.border}` }}>
<span style={{ fontSize: 10, fontWeight: 700, padding: "2px 10px", borderRadius: 20, background: cc.bg, color: cc.text }}>{item.category}</span>
<h2 style={{ fontSize: 20, fontWeight: 700, color: "#1E293B", margin: "10px 0 16px" }}>{item.title}</h2>
<DR icon="📅" label="日程" value={item.date} />
<DR icon="⏰" label="集合" value={item.gather} />
<DR icon="🏁" label="解散予定" value={item.end} />
<DR icon="📍" label="会場" value={item.venue} />
<div style={{ marginTop: 16, padding: 12, background: "#F8FAFC", borderRadius: 10 }}>
<div style={{ fontSize: 11, color: "#64748B", fontWeight: 600, marginBottom: 8 }}>持ち物</div>
{item.items.map((i, idx) => <div key={idx} style={{ fontSize: 13, color: "#334155", padding: "3px 0" }}>・{i}</div>)}
</div>
</div>
</div>
</div>
);
}

function VenueTab({ data }) {
const [open, setOpen] = useState(null);
return (
<div>
<SH title="会場情報" sub={`${data.length}件`} />
<div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
{data.map(v => (
<div key={v.id} style={{ background: "#fff", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
<div onClick={() => setOpen(open === v.id ? null : v.id)} style={{ padding: 16, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
<div>
<div style={{ fontSize: 15, fontWeight: 700, color: "#1E293B" }}>📍 {v.name}</div>
<div style={{ fontSize: 12, color: "#64748B", marginTop: 4 }}>{v.address}</div>
</div>
<span style={{ color: "#94A3B8" }}>{open === v.id ? "▲" : "▼"}</span>
</div>
{open === v.id && (
<div style={{ padding: "0 16px 16px", borderTop: "1px solid #F1F5F9" }}>
<IB icon="🅿️" label="駐車場" value={v.parking} />
<IB icon="📋" label="ルール" value={v.rules} />
<IB icon="ℹ️" label="アクセス" value={v.notes} />
</div>
)}
</div>
))}
</div>
</div>
);
}

const TRANSPORT_OPTS = [
{ key: "van", label: "バン乗車" },
{ key: "atsugi", label: "厚木" },
{ key: "jungle", label: "ジャングル" },
{ key: "local", label: "現地解散" },
];

function TransportTab({ data }) {
const [replies, setReplies] = useState({});
return (
<div>
<SH title="送迎情報" sub={`${data.length}件`} />
<div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
{data.map(t => {
const reply = replies[t.id] || {};
const answered = TRANSPORT_OPTS.filter(o => reply[o.key]).length;
return (
<div key={t.id} style={{ background: "#fff", borderRadius: 14, padding: 18, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
<div>
<div style={{ fontSize: 14, fontWeight: 700, color: "#1E293B" }}>{t.eventTitle}</div>
<div style={{ fontSize: 12, color: "#64748B", marginTop: 2 }}>{t.date}</div>
</div>
{answered > 0 && (
<span style={{ fontSize: 11, fontWeight: 700, background: answered === 4 ? "#F0FDF4" : "#FFFBEB", color: answered === 4 ? "#16A34A" : "#D97706", padding: "3px 10px", borderRadius: 20 }}>
{answered === 4 ? "✓ 回答済み" : `${answered}/4 回答中`}
</span>
)}
</div>
<div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
<div style={{ background: "#F8FAFC", borderRadius: 10, padding: "10px 12px" }}>
<div style={{ fontSize: 10, color: "#94A3B8", marginBottom: 4 }}>集合場所</div>
<div style={{ fontSize: 12, color: "#1E293B", fontWeight: 600, lineHeight: 1.4 }}>{t.gatherSpot}</div>
</div>
<div style={{ background: "#F8FAFC", borderRadius: 10, padding: "10px 12px" }}>
<div style={{ fontSize: 10, color: "#94A3B8", marginBottom: 4 }}>時間</div>
<div style={{ fontSize: 12, color: "#1E293B", fontWeight: 600 }}>集合 {t.gatherTime}<br />出発 {t.departTime}</div>
</div>
</div>
<div style={{ marginTop: 10, background: "#F8FAFC", borderRadius: 10, padding: "10px 12px" }}>
<div style={{ fontSize: 10, color: "#94A3B8", marginBottom: 4 }}>移動手段</div>
<div style={{ fontSize: 13, color: "#1E293B", fontWeight: 600 }}>🚌 {t.method}</div>
</div>
{t.notes && (
<div style={{ marginTop: 10, background: "#FFFBEB", borderRadius: 10, padding: "10px 12px", borderLeft: "3px solid #FCD34D" }}>
<div style={{ fontSize: 12, color: "#92400E" }}>⚠️ {t.notes}</div>
</div>
)}
<div style={{ marginTop: 14 }}>
<div style={{ fontSize: 12, color: "#64748B", fontWeight: 600, marginBottom: 10 }}>送迎回答</div>
<div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
{TRANSPORT_OPTS.map(opt => {
const val = reply[opt.key];
return (
<div key={opt.key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#F8FAFC", borderRadius: 10, padding: "10px 14px" }}>
<span style={{ fontSize: 13, fontWeight: 600, color: "#1E293B" }}>{opt.label}</span>
<div style={{ display: "flex", gap: 8 }}>
{[{ v: "yes", label: "◯", color: "#16A34A", bg: "#F0FDF4" }, { v: "no", label: "✕", color: "#DC2626", bg: "#FEF2F2" }].map(btn => (
<button key={btn.v} onClick={() => setReplies(prev => ({ ...prev, [t.id]: { ...(prev[t.id] || {}), [opt.key]: btn.v } }))} style={{ width: 38, height: 38, borderRadius: 8, border: "2px solid", borderColor: val === btn.v ? btn.color : "#E2E8F0", background: val === btn.v ? btn.bg : "#fff", color: val === btn.v ? btn.color : "#CBD5E1", fontWeight: 700, fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{btn.label}</button>
))}
</div>
</div>
);
})}
</div>
</div>
</div>
);
})}
</div>
</div>
);
}

function WearTab({ data, isCoach, orders, onOrder }) {
const [orderModal, setOrderModal] = useState(null);
return (
<div>
<SH title="ウェア発注" sub={isCoach ? `注文 ${orders.length}件` : `${data.length}件`} />
{isCoach && (
<div style={{ padding: "0 16px 12px" }}>
<div style={{ padding: "10px 14px", background: "#EFF6FF", borderRadius: 10, marginBottom: 12 }}>
<div style={{ fontSize: 11, color: "#1D4ED8", fontWeight: 600 }}>📧 保護者が発注すると info@testigo.jp へ自動通知されます</div>
</div>
{orders.length === 0 ? (
<div style={{ background: "#fff", borderRadius: 14, padding: 24, textAlign: "center", color: "#94A3B8", fontSize: 13, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>まだ発注はありません</div>
) : (
<div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
{orders.map((o, i) => (
<div key={i} style={{ background: "#fff", borderRadius: 14, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", borderLeft: "4px solid #2E6DA4" }}>
<div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
<div>
<div style={{ fontSize: 13, fontWeight: 700, color: "#1E293B" }}>{o.wearTitle}</div>
<div style={{ fontSize: 11, color: "#64748B", marginTop: 2 }}>{o.parentName} · {o.sentAt}</div>
</div>
<span style={{ fontSize: 10, background: "#F0FDF4", color: "#16A34A", fontWeight: 700, padding: "2px 8px", borderRadius: 20 }}>受信済み</span>
</div>
{Object.entries(o.selections).map(([k, v]) => (
<div key={k} style={{ fontSize: 12, color: "#475569" }}>・{k}: {v}</div>
))}
</div>
))}
</div>
)}
</div>
)}
{!isCoach && (
<div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
{data.map(w => {
const myOrder = orders.find(o => o.wearId === w.id);
return (
<div key={w.id} style={{ background: "#fff", borderRadius: 14, padding: 18, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", borderTop: `3px solid ${w.status === "受付中" ? "#2E6DA4" : "#94A3B8"}` }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
<div>
<div style={{ fontSize: 14, fontWeight: 700, color: "#1E293B" }}>{w.title}</div>
<div style={{ fontSize: 12, color: "#64748B", marginTop: 3 }}>発注期限: {w.period}</div>
</div>
<span style={{ fontSize: 11, fontWeight: 700, background: w.status === "受付中" ? "#EFF6FF" : "#F1F5F9", color: w.status === "受付中" ? "#2E6DA4" : "#64748B", padding: "3px 10px", borderRadius: 20 }}>{w.status}</span>
</div>
{w.items.map((item, i) => (
<div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid #F1F5F9" }}>
<div>
<div style={{ fontSize: 13, color: "#1E293B", fontWeight: 500 }}>👕 {item.name}</div>
<div style={{ fontSize: 11, color: "#94A3B8", marginTop: 2 }}>{item.sizes.join(" / ")}</div>
</div>
<div style={{ fontSize: 14, fontWeight: 700, color: "#2E6DA4" }}>¥{item.price.toLocaleString()}</div>
</div>
))}
<div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 5 }}>
<div style={{ fontSize: 12, color: "#64748B" }}>💳 支払: {w.payment}</div>
<div style={{ fontSize: 12, color: "#64748B" }}>📦 受渡: {w.delivery}</div>
</div>
{myOrder ? (
<div style={{ marginTop: 12, background: "#F0FDF4", borderRadius: 10, padding: "10px 12px", border: "1px solid #BBF7D0" }}>
<div style={{ fontSize: 11, color: "#16A34A", fontWeight: 700, marginBottom: 6 }}>✓ 発注済み</div>
{Object.entries(myOrder.selections).map(([k, v]) => (
<div key={k} style={{ fontSize: 12, color: "#166534" }}>・{k}: {v}</div>
))}
</div>
) : w.status === "受付中" && (
<button onClick={() => setOrderModal(w)} style={{ width: "100%", marginTop: 12, padding: "12px 0", background: "#2E6DA4", color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>発注する →</button>
)}
</div>
);
})}
</div>
)}
{orderModal && <WearOrderModal wear={orderModal} onClose={() => setOrderModal(null)} onSubmit={o => { onOrder(o); setOrderModal(null); }} />}
</div>
);
}

function WearOrderModal({ wear, onClose, onSubmit }) {
const [name, setName] = useState("");
const [sel, setSel] = useState({});
const [done, setDone] = useState(false);
const submit = () => {
if (!name.trim() || !wear.items.every(i => sel[i.name])) return;
const now = new Date().toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
onSubmit({ wearId: wear.id, wearTitle: wear.title, parentName: name, selections: sel, sentAt: now });
setDone(true);
};
return (
<div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
<div style={{ background: "#fff", borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 430, maxHeight: "90vh", overflowY: "auto", padding: 24 }}>
{done ? (
<div style={{ textAlign: "center", padding: "32px 0" }}>
<div style={{ fontSize: 52, marginBottom: 16 }}>✅</div>
<div style={{ fontSize: 18, fontWeight: 700, color: "#1E293B", marginBottom: 8 }}>発注を送信しました</div>
<div style={{ fontSize: 13, color: "#64748B" }}>info@testigo.jp に通知しました</div>
<button onClick={onClose} style={{ marginTop: 28, padding: "12px 36px", background: "#2E6DA4", color: "#fff", border: "none", borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>閉じる</button>
</div>
) : (
<>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
<div style={{ fontSize: 16, fontWeight: 700, color: "#1E293B" }}>発注フォーム</div>
<button onClick={onClose} style={{ border: "none", background: "#F1F5F9", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 15 }}>✕</button>
</div>
<div style={{ fontSize: 13, color: "#64748B", marginBottom: 16, fontWeight: 600 }}>{wear.title}</div>
<div style={{ marginBottom: 16 }}>
<label style={{ fontSize: 12, color: "#64748B", fontWeight: 600 }}>お子さんのお名前</label>
<input value={name} onChange={e => setName(e.target.value)} placeholder="例: 田中 大輝" style={{ display: "block", width: "100%", marginTop: 6, padding: "10px 12px", borderRadius: 10, border: "1.5px solid #E2E8F0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
</div>
{wear.items.map(item => (
<div key={item.name} style={{ marginBottom: 16 }}>
<label style={{ fontSize: 12, color: "#64748B", fontWeight: 600 }}>{item.name} <span style={{ color: "#2E6DA4" }}>¥{item.price.toLocaleString()}</span></label>
<div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 8 }}>
{item.sizes.map(sz => (
<button key={sz} onClick={() => setSel(p => ({ ...p, [item.name]: sz }))} style={{ padding: "7px 14px", borderRadius: 8, border: "2px solid", borderColor: sel[item.name] === sz ? "#2E6DA4" : "#E2E8F0", background: sel[item.name] === sz ? "#EFF6FF" : "#fff", color: sel[item.name] === sz ? "#2E6DA4" : "#64748B", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>{sz}</button>
))}
</div>
</div>
))}
<div style={{ marginBottom: 20, padding: "10px 14px", background: "#FFF7ED", borderRadius: 10 }}>
<div style={{ fontSize: 11, color: "#C2410C" }}>💳 {wear.payment}</div>
<div style={{ fontSize: 11, color: "#C2410C", marginTop: 3 }}>📦 {wear.delivery}</div>
</div>
<button onClick={submit} style={{ width: "100%", padding: "14px 0", background: "#DC2626", color: "#fff", border: "none", borderRadius: 12, fontWeight: 700, fontSize: 15, cursor: "pointer" }}>発注を送信する</button>
<div style={{ textAlign: "center", fontSize: 11, color: "#94A3B8", marginTop: 8 }}>送信後 info@testigo.jp に通知されます</div>
</>
)}
</div>
</div>
);
}

function PostScheduleModal({ onClose, onSave }) {
const [f, setF] = useState({ title: "", date: "", gather: "", end: "", category: "練習", venue: "", items: "" });
const s = (k, v) => setF(p => ({ ...p, [k]: v }));
return (
<Modal title="スケジュール投稿" onClose={onClose}>
<MF label="タイトル" value={f.title} onChange={v => s("title", v)} placeholder="例: 春季リーグ戦 第2節" />
<MF label="日程" value={f.date} onChange={v => s("date", v)} placeholder="2026年6月7日（日）" />
<MF label="集合時間" value={f.gather} onChange={v => s("gather", v)} placeholder="08:00" />
<MF label="解散予定" value={f.end} onChange={v => s("end", v)} placeholder="17:00" />
<div style={{ marginBottom: 14 }}>
<div style={{ fontSize: 12, color: "#64748B", fontWeight: 600, marginBottom: 6 }}>カテゴリー</div>
<div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
{["練習","試合","遠征","イベント"].map(c => (
<button key={c} onClick={() => s("category", c)} style={{ padding: "6px 14px", borderRadius: 8, border: "2px solid", borderColor: f.category === c ? "#2E6DA4" : "#E2E8F0", background: f.category === c ? "#EFF6FF" : "#fff", color: f.category === c ? "#2E6DA4" : "#64748B", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>{c}</button>
))}
</div>
</div>
<MF label="会場" value={f.venue} onChange={v => s("venue", v)} placeholder="市立第一グラウンド" />
<MF label="持ち物（カンマ区切り）" value={f.items} onChange={v => s("items", v)} placeholder="ボール, 水筒, 着替え" />
<button onClick={() => f.title && f.date && onSave({ ...f, items: f.items.split(",").map(x => x.trim()).filter(Boolean) })} style={{ width: "100%", padding: "13px 0", background: "#DC2626", color: "#fff", border: "none", borderRadius: 12, fontWeight: 700, fontSize: 14, cursor: "pointer", marginTop: 8 }}>投稿する</button>
</Modal>
);
}

function PostVenueModal({ onClose, onSave }) {
const [f, setF] = useState({ name: "", address: "", parking: "", rules: "", notes: "" });
const s = (k, v) => setF(p => ({ ...p, [k]: v }));
return (
<Modal title="会場情報を投稿" onClose={onClose}>
<MF label="会場名" value={f.name} onChange={v => s("name", v)} placeholder="市立第一グラウンド" />
<MF label="住所" value={f.address} onChange={v => s("address", v)} placeholder="東京都〇〇区..." />
<MF label="駐車場" value={f.parking} onChange={v => s("parking", v)} placeholder="第一駐車場（30台）" />
<MF label="入場ルール" value={f.rules} onChange={v => s("rules", v)} placeholder="スパイク着用はコート内のみ" />
<MF label="アクセス・備考" value={f.notes} onChange={v => s("notes", v)} placeholder="〇〇駅より徒歩10分" />
<button onClick={() => f.name && onSave(f)} style={{ width: "100%", padding: "13px 0", background: "#DC2626", color: "#fff", border: "none", borderRadius: 12, fontWeight: 700, fontSize: 14, cursor: "pointer", marginTop: 8 }}>投稿する</button>
</Modal>
);
}

function PostTransportModal({ onClose, onSave }) {
const [f, setF] = useState({ eventTitle: "", date: "", gatherSpot: "", gatherTime: "", departTime: "", method: "", notes: "" });
const s = (k, v) => setF(p => ({ ...p, [k]: v }));
return (
<Modal title="送迎情報を投稿" onClose={onClose}>
<MF label="イベント名" value={f.eventTitle} onChange={v => s("eventTitle", v)} placeholder="春季リーグ戦 第2節" />
<MF label="日程" value={f.date} onChange={v => s("date", v)} placeholder="2026年6月7日（日）" />
<MF label="集合場所" value={f.gatherSpot} onChange={v => s("gatherSpot", v)} placeholder="市立第一グラウンド 駐車場前" />
<MF label="集合時間" value={f.gatherTime} onChange={v => s("gatherTime", v)} placeholder="07:15" />
<MF label="出発時間" value={f.departTime} onChange={v => s("departTime", v)} placeholder="07:30" />
<MF label="移動手段" value={f.method} onChange={v => s("method", v)} placeholder="チームバス" />
<MF label="注意事項" value={f.notes} onChange={v => s("notes", v)} placeholder="遅刻の場合はコーチに連絡" />
<button onClick={() => f.eventTitle && onSave(f)} style={{ width: "100%", padding: "13px 0", background: "#DC2626", color: "#fff", border: "none", borderRadius: 12, fontWeight: 700, fontSize: 14, cursor: "pointer", marginTop: 8 }}>投稿する</button>
</Modal>
);
}

function Modal({ title, onClose, children }) {
return (
<div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
<div style={{ background: "#fff", borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 430, maxHeight: "90vh", overflowY: "auto", padding: 24 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
<div style={{ fontSize: 16, fontWeight: 700, color: "#1E293B" }}>{title}</div>
<button onClick={onClose} style={{ border: "none", background: "#F1F5F9", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 15 }}>✕</button>
</div>
{children}
</div>
</div>
);
}

function MF({ label, value, onChange, placeholder }) {
return (
<div style={{ marginBottom: 14 }}>
<label style={{ fontSize: 12, color: "#64748B", fontWeight: 600 }}>{label}</label>
<input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{ display: "block", width: "100%", marginTop: 6, padding: "10px 12px", borderRadius: 10, border: "1.5px solid #E2E8F0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
</div>
);
}

function SH({ title, sub }) {
return (
<div style={{ padding: "20px 20px 12px", display: "flex", alignItems: "baseline", gap: 8 }}>
<h2 style={{ fontSize: 17, fontWeight: 700, color: "#1E293B", margin: 0 }}>{title}</h2>
<span style={{ fontSize: 12, color: "#94A3B8" }}>{sub}</span>
</div>
);
}
function BackBar({ title, onBack }) {
return (
<div style={{ background: "#fff", padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid #F1F5F9" }}>
<button onClick={onBack} style={{ border: "none", background: "#F1F5F9", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>←</button>
<span style={{ fontWeight: 700, fontSize: 15, color: "#1E293B" }}>{title}</span>
</div>
);
}
function DR({ icon, label, value }) {
return (
<div style={{ display: "flex", gap: 10, padding: "7px 0", borderBottom: "1px solid #F1F5F9" }}>
<span style={{ fontSize: 14, width: 20, textAlign: "center" }}>{icon}</span>
<span style={{ fontSize: 12, color: "#94A3B8", width: 72, flexShrink: 0 }}>{label}</span>
<span style={{ fontSize: 13, color: "#1E293B", fontWeight: 500 }}>{value}</span>
</div>
);
}
function IB({ icon, label, value }) {
return (
<div style={{ marginTop: 10 }}>
<div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 600, marginBottom: 2 }}>{icon} {label}</div>
<div style={{ fontSize: 13, color: "#334155", lineHeight: 1.6 }}>{value}</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
